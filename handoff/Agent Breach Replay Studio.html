  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+FFFD;\n}\n<\u002Fstyle>\n<style>\nbody{margin:0;background:#efede8;font-family:'Instrument Sans',system-ui,sans-serif}\na{color:#1c1e21}a:hover{color:#a83a2c}\n.dv-turn{padding:40px 44px 32px;border-bottom:1px solid rgba(0,0,0,.08);scroll-margin-top:16px}\n.dv-thd{display:flex;align-items:baseline;gap:10px;margin:0 0 20px}\n.dv-tid{font:600 10px 'JetBrains Mono',monospace;padding:3px 7px;background:#1a1a1a;color:#fff;border-radius:4px;text-decoration:none}\n.dv-tname{font:600 13px/1.2 'Instrument Sans',sans-serif;color:#1a1a1a}\n.dv-opts{display:flex;flex-wrap:wrap;gap:28px;align-items:flex-start}\n.dv-opt{flex:none;display:flex;flex-direction:column;gap:9px;scroll-margin-top:16px}\n.dv-oid{font:600 10.5px 'JetBrains Mono',monospace;padding:3px 7px;background:rgba(0,0,0,.08);color:#1a1a1a;border-radius:5px;text-decoration:none}\n.dv-olabel{display:flex;align-items:baseline;gap:8px;font:400 11px/1.3 'Instrument Sans',sans-serif;color:rgba(0,0,0,.55)}\n.dv-card{max-width:100%;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}\n.dv-opt:target .dv-oid{background:#2a78d6;color:#fff}\n.dv-next{margin:22px 0 0;font:12px/1.5 'Instrument Sans',sans-serif;color:rgba(0,0,0,.5)}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section class=\"dv-turn\" id=\"t2\" style=\"width: 1266px; height: 917px\">\n<div class=\"dv-thd\"><a class=\"dv-tid\" href=\"#t2\">2<\u002Fa><span class=\"dv-tname\">Agent Breach Replay Studio — final direction<\u002Fspan><\u002Fdiv>\n<div class=\"dv-opts\">\n\n<!-- ============================ OPTION 2A : VIBRANT CONSOLE ============================ -->\n<div class=\"dv-opt\" id=\"2a\">\n<div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#2a\">2a<\u002Fa>Vibrant console — colorful pills, card-style graph nodes, red taint arrows, search + export chrome<\u002Fdiv>\n<div class=\"dv-card\" style=\"width:1240px\">\n<div style=\"width:1240px;height:800px;display:flex;background:#f7f6f2;color:#1c1e21;font-family:'Instrument Sans',sans-serif;overflow:hidden\">\n\n  <!-- sidebar -->\n  <div style=\"width:210px;flex:none;background:#fbfaf7;border-right:1px solid #e5e3dd;display:flex;flex-direction:column;padding:16px 12px;box-sizing:border-box\">\n    <div style=\"display:flex;align-items:center;gap:9px;padding:2px 6px 0\">\n      <div style=\"width:26px;height:26px;flex:none;border-radius:8px;background:conic-gradient(from 210deg,#ff5d3a,#ffb02e,#33c481,#2e8bff,#8b5cf6,#ff5d3a);display:flex;align-items:center;justify-content:center\">\n        <div style=\"width:12px;height:12px;background:#fff;border-radius:3.5px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;line-height:1.1\">Agent Breach<\u002Fdiv>\n        <div style=\"font:500 8.5px 'JetBrains Mono',monospace;color:#74777d;letter-spacing:.12em;margin-top:2px\">REPLAY STUDIO<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:20px\"><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:2px\">\n      <sc-for list=\"{{ C.nav }}\" as=\"n\" hint-placeholder-count=\"5\">\n        <div onclick=\"{{ n.go }}\" style=\"{{ n.style }}\" style-hover=\"background:#efede6\">{{ n.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <div style=\"border:1px dashed #d6d4cc;border-radius:7px;padding:8px 10px;font:500 8.5px 'JetBrains Mono',monospace;color:#74777d;letter-spacing:.06em;line-height:1.6\">CAPTURE<br><span style=\"color:#0f7a4d\">METADATA-ONLY<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- main -->\n  <div style=\"flex:1;min-width:0;display:flex;flex-direction:column\">\n    <div style=\"height:54px;flex:none;background:#fff;border-bottom:1px solid #e5e3dd;display:flex;align-items:center;gap:12px;padding:0 20px;box-sizing:border-box\">\n      <div style=\"font-size:14px;font-weight:650;flex:none\">{{ C.title }}<\u002Fdiv>\n      <sc-if value=\"{{ C.notBoard }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;gap:6px;flex:none\">\n          <sc-for list=\"{{ C.scTabs }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ s.go }}\" style=\"{{ s.style }}\">{{ s.id }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"flex:1;max-width:380px;margin-left:auto;border:1px solid #e2e0d9;border-radius:9px;padding:7px 12px;font-size:11.5px;color:#9a988f;background:#fbfaf7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Search traces — try \"blocked exfiltration\"<\u002Fdiv>\n      <div style=\"flex:none;font-size:11.5px;font-weight:650;border:1px solid #dcdad3;border-radius:8px;padding:7px 12px;cursor:pointer;background:#fff\" style-hover=\"background:#f4f2ec\">Import trace<\u002Fdiv>\n      <div style=\"flex:none;font-size:11.5px;font-weight:650;background:#1c1e21;color:#fff;border-radius:8px;padding:7px 13px;cursor:pointer\" style-hover=\"background:#33363b\">Export report<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- BOARD -->\n    <sc-if value=\"{{ C.isBoard }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"2a Incidents\" style=\"flex:1;min-height:0;padding:20px;box-sizing:border-box;display:flex;flex-direction:column;gap:14px;overflow:auto\">\n        <div style=\"display:flex;gap:12px\">\n          <sc-for list=\"{{ C.stats }}\" as=\"st\" hint-placeholder-count=\"4\">\n            <div style=\"flex:1;background:#fff;border:1px solid #e5e3dd;border-radius:10px;padding:14px 16px\">\n              <div style=\"font:500 9.5px 'JetBrains Mono',monospace;color:#74777d;letter-spacing:.1em\">{{ st.k }}<\u002Fdiv>\n              <div style=\"font-size:26px;font-weight:700;margin-top:6px;color:{{ st.c }}\">{{ st.vl }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#9a988f;margin-top:2px\">{{ st.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#fff;b
